<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ElectroFix Hub - Premium Dashboard</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #020617 100%);
            --glass-bg: rgba(30, 41, 59, 0.4);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent-glow: linear-gradient(135deg, #38bdf8 0%, #818cf8 100%);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            overflow-x: hidden;
        }

        /* Perspective space setup */
        .dashboard-container {
            width: 100%;
            max-width: 1000px;
            perspective: 1200px;
        }

        /* Main Floating Dashboard Structure */
        .glass-panel {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 3rem;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Elegant Minimalist Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 1.5rem;
        }

        header h1 {
            font-size: 1.75rem;
            font-weight: 600;
            letter-spacing: -0.02em;
        }

        .status-badge {
            background: rgba(56, 189, 248, 0.1);
            border: 1px solid rgba(56, 189, 248, 0.2);
            padding: 0.5rem 1rem;
            border-radius: 99px;
            font-size: 0.85rem;
            color: #38bdf8;
            font-weight: 500;
        }

        /* 3D Grid Elements */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        .stat-card {
            background: rgba(15, 23, 42, 0.3);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 1.75rem;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            transform: translateZ(0px);
        }

        /* Clean 3D Lift Action */
        .stat-card:hover {
            transform: translateZ(30px);
            background: rgba(30, 41, 59, 0.6);
            border-color: rgba(56, 189, 248, 0.3);
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.3);
        }

        .stat-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            font-weight: 500;
            margin-bottom: 0.5rem;
        }

        .stat-value {
            font-size: 2.25rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            margin-bottom: 0.75rem;
        }

        .progress-track {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: var(--accent-glow);
            width: 0%;
            transition: width 1s ease-out;
        }

        /* Stream/Log Table Section */
        .data-section h2 {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 1.25rem;
        }

        .stream-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .stream-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(15, 23, 42, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.03);
            padding: 1rem 1.5rem;
            border-radius: 12px;
            font-size: 0.95rem;
            transition: background 0.2s;
        }

        .stream-row:hover {
            background: rgba(15, 23, 42, 0.4);
        }

        .device-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .type-tag {
            font-size: 0.75rem;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 0.05em;
            color: var(--text-secondary);
            background: rgba(255, 255, 255, 0.05);
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
        }

        .row-status {
            font-size: 0.85rem;
            font-weight: 500;
            color: #10b981;
        }

        /* Smooth Tilt Script Integration triggers */
        @media (max-width: 768px) {
            padding: 1rem;
            .glass-panel { padding: 1.5rem; }
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <div class="glass-panel" id="panel">
            
            <header>
                <h1>System Hub</h1>
                <div class="status-badge">Diagnostics: Online</div>
            </header>

            <div class="stats-grid">
                
                <div class="stat-card">
                    <div class="stat-label">Active Queues</div>
                    <div class="stat-value">18</div>
                    <div class="progress-track"><div class="progress-bar" style="width: 60%;"></div></div>
                </div>

                <div class="stat-card">
                    <div class="stat-label">Solved Tickets</div>
                    <div class="stat-value">142</div>
                    <div class="progress-track"><div class="progress-bar" style="width: 85%;"></div></div>
                </div>

                <div class="stat-card">
                    <div class="stat-label">Response Index</div>
                    <div class="stat-value">99.2%</div>
                    <div class="progress-track"><div class="progress-bar" style="width: 99%;"></div></div>
                </div>

            </div>

            <div class="data-section">
                <h2>Live Activity Stream</h2>
                <div class="stream-list">
                    
                    <div class="stream-row">
                        <div class="device-info">
                            <span class="type-tag">Laptop</span>
                            <span>Power rails failing check sequence</span>
                        </div>
                        <span class="row-status" style="color: #f59e0b;">Reviewing</span>
                    </div>

                    <div class="stream-row">
                        <div class="device-info">
                            <span class="type-tag">Smartphone</span>
                            <span>Display assembly replacement config</span>
                        </div>
                        <span class="row-status">Completed</span>
                    </div>

                    <div class="stream-row">
                        <div class="device-info">
                            <span class="type-tag">Console</span>
                            <span>APU thermal compound dry replacement</span>
                        </div>
                        <span class="row-status">Completed</span>
                    </div>

                </div>
            </div>

        </div>
    </div>

    <script>
        const panel = document.getElementById('panel');
        const container = document.querySelector('.dashboard-container');

        // Smooth subtle 3D glass mouse follow effect
        container.addEventListener('mousemove', (e) => {
            const rect = container.getBoundingClientRect();
            const x = e.clientX - rect.left - (rect.width / 2);
            const y = e.clientY - rect.top - (rect.height / 2);
            
            // Subtle premium movement parameters (max 6 degree tilt)
            const tiltX = -(y / rect.height) * 12;
            const tiltY = (x / rect.width) * 12;

            panel.style.transform = `rotateX(${tiltX}deg) rotateY(${tiltY}deg)`;
        });

        container.addEventListener('mouseleave', () => {
            panel.style.transform = 'rotateX(0deg) rotateY(0deg)';
        });

        // Trigger loading animations
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                document.querySelectorAll('.progress-bar').forEach(bar => {
                    bar.style.width = bar.style.width; 
                });
            }, 150);
        });
    </script>
</body>
</html>
