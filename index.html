HTML
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ElectroFix Hub - Command Center</title>
    <style>
        :root {
            --bg-color: #0b111e;
            --glass-bg: rgba(25, 41, 66, 0.3);
            --glass-border: rgba(255, 255, 255, 0.1);
            --neon-cyan: #3df0ff;
            --neon-purple: #c084fc;
            --text-main: #ffffff;
            --text-muted: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            padding: 2rem;
        }

        .workspace {
            flex: 1;
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .dashboard-layout {
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            gap: 2rem;
        }

        .glass-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 1.75rem;
            backdrop-filter: blur(20px);
        }

        .card-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 1.25rem;
        }

        .stream-item {
            padding: 1rem 0;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .stream-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #eab308;
            display: inline-block;
        }

        .payment-methods-grid {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .payment-node-option {
            background: rgba(13, 22, 38, 0.5);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            padding: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .payment-node-option:hover {
            border-color: var(--neon-cyan);
        }

        /* IN-PAGE INPUT INTERFACE */
        .payment-process-panel {
            display: none;
            margin-top: 1.5rem;
            background: rgba(13, 22, 38, 0.8);
            border: 1px solid rgba(61, 240, 255, 0.2);
            border-radius: 12px;
            padding: 1.2rem;
        }

        .payment-process-panel.active {
            display: block;
        }

        .process-instructions {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 1rem;
            line-height: 1.5;
        }

        .process-input-container {
            display: flex;
            gap: 0.5rem;
        }

        .process-input {
            flex: 1;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            padding: 0.7rem;
            color: #ffffff;
            outline: none;
        }

        .process-submit-btn {
            background: var(--neon-cyan);
            color: #0b111e;
            border: none;
            padding: 0 1.2rem;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
        }

        .error-msg {
            color: #ff4a4a;
            font-size: 0.8rem;
            margin-top: 0.5rem;
            display: none;
        }
    </style>
</head>
<body>

    <div class="workspace">
        <h1>ElectroFix // Command_Center</h1>

        <div class="dashboard-layout">
            <div class="glass-card">
                <div class="card-title">Incoming Diagnostics Stream</div>
                <div class="stream-item">
                    <span id="streamDot" class="stream-indicator"></span>
                    <span id="streamText">Diagnostics #76S — <strong>Awaiting Service Fee</strong></span>
                </div>
            </div>

            <div class="glass-card">
                <div class="card-title">Secure Gateway Payment</div>
                <div class="payment-methods-grid">
                    
                    <div class="payment-node-option" onclick="showProcess('Telebirr', '0912345678')">
                        <div>
                            <h4>Telebirr Mobile Pay</h4>
                            <p style="color: var(--text-muted); font-size: 0.8rem;">Submit transaction text code</p>
                        </div>
                        <div>→</div>
                    </div>

                    <div class="payment-node-option" onclick="showProcess('CBE', '1000123456789')">
                        <div>
                            <h4>CBE Birr Portal</h4>
                            <p style="color: var(--text-muted); font-size: 0.8rem;">Submit bank transfer code</p>
                        </div>
                        <div>→</div>
                    </div>

                </div>

                <div id="processArea" class="payment-process-panel">
                    <div id="processInstructions" class="process-instructions"></div>
                    <div class="process-input-container">
                        <input type="text" id="transactionCodeInput" class="process-input" placeholder="Paste code here...">
                        <button class="process-submit-btn" onclick="submitTransactionCode()">Submit</button>
                    </div>
                    <div id="errorField" class="error-msg">Please type a code first.</div>
                </div>

            </div>
        </div>
    </div>

    <script>
        let chosenMethod = '';

        function showProcess(method, accountDetails) {
            chosenMethod = method;
            document.getElementById('errorField').style.display = 'none';
            document.getElementById('processArea').classList.add('active');
            
            if(method === 'Telebirr') {
                document.getElementById('processInstructions').innerHTML = `Transfer to Telebirr: <strong>${accountDetails}</strong>. Then enter your confirmation transaction text code below:`;
            } else {
                document.getElementById('processInstructions').innerHTML = `Transfer to CBE Account: <strong>${accountDetails}</strong>. Then enter your Txn Ref code below:`;
            }
        }

        function submitTransactionCode() {
            const enteredCode = document.getElementById('transactionCodeInput').value.trim();
            
            if (!enteredCode) {
                document.getElementById('errorField').style.display = 'block';
                return;
            }

            // Directly rewrite the layout contents on the screen
            document.getElementById('streamDot').style.background = "#c084fc";
            document.getElementById('streamText').innerHTML = `Diagnostics #76S — <span style="color: #c084fc">Verifying ${chosenMethod} Code: <strong>${enteredCode}</strong></span>`;

            // Hide entry field smoothly
            document.getElementById('transactionCodeInput').value = '';
            document.getElementById('processArea').classList.remove('active');
        }
    </script>
</body>
</html>
