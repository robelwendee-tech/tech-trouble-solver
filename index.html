<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ElectroFix Hub - Premium Command Center</title>
    <style>
        :root {
            --bg-color: #0d1520;
            --glass-card: rgba(20, 32, 54, 0.4);
            --glass-border: rgba(255, 255, 255, 0.12);
            --neon-cyan: #3af0ff;
            --neon-purple: #c084fc;
            --text-main: #ffffff;
            --text-muted: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            /* Full layout ambient glow nodes */
            background-image: 
                radial-gradient(circle at 0% 35%, rgba(58, 240, 255, 0.35) 0%, transparent 40%),
                radial-gradient(circle at 15% 75%, rgba(192, 132, 252, 0.2) 0%, transparent 45%),
                radial-gradient(circle at 85% 20%, rgba(58, 240, 255, 0.15) 0%, transparent 40%);
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            overflow-x: hidden;
        }

        /* Sidebar with intense left edge light streak */
        .sidebar {
            width: 280px;
            background: linear-gradient(135deg, rgba(10, 18, 30, 0.75) 0%, rgba(6, 11, 20, 0.9) 100%);
            border-right: 1px solid var(--glass-border);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            padding: 2.5rem 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 2.5rem;
            flex-shrink: 0;
            position: relative;
        }

        /* Sharp left-hand neon flare streak */
        .sidebar::before {
            content: '';
            position: absolute;
            top: 10%;
            left: -40px;
            width: 80px;
            height: 500px;
            background: radial-gradient(ellipse at center, rgba(58, 240, 255, 0.6) 0%, rgba(192, 132, 252, 0.25) 50%, transparent 75%);
            filter: blur(30px);
            pointer-events: none;
            z-index: 1;
        }

        .sidebar-brand {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(to right, #ffffff, var(--neon-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            z-index: 2;
        }

        .sidebar-menu {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            list-style: none;
            z-index: 2;
        }

        .menu-link {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.9rem 1.2rem;
            color: var(--text-muted);
            text-decoration: none;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 500;
            transition: all 0.3s;
            border: 1px solid transparent;
        }

        .menu-link:hover, .menu-item.active .menu-link {
            color: #ffffff;
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
        }

        .status-pill {
            background: rgba(58, 240, 255, 0.15);
            color: var(--neon-cyan);
            border: 1px solid rgba(58, 240, 255, 0.3);
            padding: 0.15rem 0.5rem;
            font-size: 0.72rem;
            border-radius: 6px;
            font-weight: 600;
            box-shadow: 0 0 8px rgba(58, 240, 255, 0.3);
        }

        /* Workspace main grid canvas */
        .workspace-canvas {
            flex: 1;
            padding: 3.5rem;
            display: flex;
            flex-direction: column;
            gap: 2rem;
            max-width: 1400px;
            width: 100%;
        }

        .header-block h1 {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -0.03em;
        }

        .header-block .node-status {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-top: 0.4rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .node-pulse {
            width: 8px;
            height: 8px;
            background-color: var(--neon-cyan);
            border-radius: 50%;
            box-shadow: 0 0 12px var(--neon-cyan);
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1.6fr 1fr;
            gap: 2rem;
        }

        .left-column, .right-column {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        /* High fidelity frosted glass panels */
        .glass-panel {
            background: var(--glass-card);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 2rem;
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.35), inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        .panel-heading {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            color: rgba(255, 255, 255, 0.95);
        }

        .stats-pair {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .metric-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-muted);
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .metric-value {
            font-size: 3.2rem;
            font-weight: 700;
            background: linear-gradient(to bottom, #ffffff, #cbd5e1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Glowing Tech Grid Block */
        .time-box {
            background: linear-gradient(135deg, rgba(58, 240, 255, 0.08) 0%, rgba(15, 23, 42, 0.6) 100%);
            border: 1px solid rgba(58, 240, 255, 0.25);
            border-radius: 20px;
            padding: 2rem;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3), 0 0 30px rgba(58, 240, 255, 0.05);
        }

        /* Tech Blueprint Grid Backdrop lines */
        .time-box::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                linear-gradient(rgba(58, 240, 255, 0.05) 1px, transparent 1px), 
                linear-gradient(90deg, rgba(58, 240, 255, 0.05) 1px, transparent 1px);
            background-size: 14px 14px;
        }

        .time-content {
            position: relative;
            z-index: 2;
        }

        /* Device Showcase with 3D Float Cards */
        .device-showcase {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
        }

        .premium-device-card {
            flex: 1;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.07) 0%, rgba(255, 255, 255, 0.02) 100%);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 1.25rem 0.75rem;
            text-align: center;
            backdrop-filter: blur(15px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.35);
            animation: bounce-floating 5s infinite ease-in-out;
        }

        .premium-device-card:hover {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 25px rgba(58, 240, 255, 0.3);
            transform: translateY(-5px);
        }

        .premium-device-card svg {
            width: 34px;
            height: 34px;
            margin-bottom: 0.5rem;
            filter: drop-shadow(0 0 8px rgba(58, 240, 255, 0.4));
        }

        .premium-device-card p {
            font-size: 0.72rem;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 0.05em;
        }

        .dev-1 { animation-delay: 0s; }
        .dev-2 { animation-delay: 1.5s; }
        .dev-3 { animation-delay: 3s; }

        /* Stream Rows UI */
        .stream-list {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        .stream-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 1rem;
        }

        .stream-row:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .stream-info {
            display: flex;
            align-items: center;
            gap: 0.85rem;
            font-size: 0.92rem;
        }

        .stream-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--neon-cyan);
            box-shadow: 0 0 10px var(--neon-cyan);
        }

        .stream-time {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        /* Accordion Element Styles */
        .faq-wrapper {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .faq-node {
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 1rem;
        }

        .faq-node:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .faq-trigger {
            width: 100%;
            background: transparent;
            border: none;
            color: #ffffff;
            font-size: 0.95rem;
            text-align: left;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .faq-trigger::after {
            content: '＋';
            color: var(--neon-cyan);
        }

        .faq-node.open .faq-trigger::after {
            content: '－';
        }

        .faq-panel {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
            color: var(--text-muted);
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .faq-panel p {
            padding-top: 0.6rem;
        }

        /* Registration Gateway Components */
        .registration-form {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        .input-wrapper {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .input-wrapper label {
            font-size: 0.82rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .form-field {
            width: 100%;
            background: rgba(10, 16, 26, 0.6);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            padding: 0.9rem 1.1rem;
            color: #ffffff;
            font-size: 0.92rem;
            transition: border-color 0.3s;
        }

        .form-field:focus {
            outline: none;
            border-color: var(--neon-cyan);
        }

        .submit-btn {
            background: linear-gradient(135deg, #0284c7 0%, var(--neon-cyan) 100%);
            color: #ffffff;
            border: none;
            padding: 1rem;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(2, 132, 199, 0.3);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .submit-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 12px 25px rgba(58, 240, 255, 0.4);
        }

        @keyframes bounce-floating {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-6px); }
        }

        @media (max-width: 1200px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; height: auto; }
            .sidebar::before { display: none; }
            .dashboard-grid { grid-template-columns: 1fr; }
            .workspace-canvas { padding: 2rem; }
        }
    </style>
</head>
