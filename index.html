<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ElectroFix Hub - Command Center</title>
    <style>
        :root {
            --bg-color: #0a0e16;
            --bg-accent: #0f1420;
            --glass-bg: rgba(20, 33, 54, 0.4);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-border-hover: rgba(255, 255, 255, 0.15);
            --neon-cyan: #3df0ff;
            --neon-purple: #c084fc;
            --text-main: #ffffff;
            --text-muted: #8fa3b8;
            --accent-gold: #fcd34d;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 16px 48px rgba(0, 0, 0, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        body {
            background: linear-gradient(135deg, var(--bg-color) 0%, var(--bg-accent) 100%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            padding: 2.5rem;
        }

        .workspace {
            flex: 1;
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 2.5rem;
        }

        h1 {
            font-size: 2rem;
            font-weight: 300;
            letter-spacing: 0.05em;
            background: linear-gradient(135deg, var(--text-main) 0%, var(--neon-cyan) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .dashboard-layout {
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            gap: 2rem;
        }

        .glass-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            padding: 2.25rem;
            backdrop-filter: blur(30px);
            box-shadow: var(--shadow-md);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-card:hover {
            background: rgba(20, 33, 54, 0.5);
            border-color: var(--glass-border-hover);
            box-shadow: var(--shadow-lg);
            transform: translateY(-2px);
        }

        .card-title {
            font-size: 1.05rem;
            font-weight: 600;
            margin-bottom: 1.75rem;
            letter-spacing: 0.02em;
            color: var(--text-main);
        }

        .stream-item {
            padding: 1.2rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            background: rgba(61, 240, 255, 0.05);
            border-radius: 16px;
            border: 1px solid rgba(61, 240, 255, 0.1);
            transition: all 0.2s ease;
        }

        .stream-item:hover {
            background: rgba(61, 240, 255, 0.08);
            border-color: rgba(61, 240, 255, 0.2);
        }

        .stream-indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--accent-gold);
            display: inline-block;
            box-shadow: 0 0 8px var(--accent-gold), 0 0 16px rgba(252, 211, 77, 0.2);
            flex-shrink: 0;
        }

        .payment-methods-grid {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        .payment-node-option {
            background: linear-gradient(135deg, rgba(20, 33, 54, 0.3) 0%, rgba(13, 22, 38, 0.2) 100%);
            border: 1px solid var(--glass-border);
            border-radius: 18px;
            padding: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .payment-node-option::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple));
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: -1;
        }

        .payment-node-option:hover::before {
            opacity: 0.05;
        }

        .payment-node-option:hover {
            border-color: var(--neon-cyan);
            background: linear-gradient(135deg, rgba(20, 33, 54, 0.5) 0%, rgba(13, 22, 38, 0.3) 100%);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(61, 240, 255, 0.1);
        }

        .payment-node-option h4 {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 0.4rem;
        }

        .payment-node-option p {
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 400;
        }

        .payment-node-option > div:last-child {
            font-size: 1.3rem;
            transition: transform 0.3s ease;
        }

        .payment-node-option:hover > div:last-child {
            transform: translateX(4px);
        }

        .payment-process-panel {
            display: none;
            margin-top: 1.75rem;
            background: linear-gradient(135deg, rgba(20, 33, 54, 0.6) 0%, rgba(13, 22, 38, 0.4) 100%);
            border: 1px solid rgba(61, 240, 255, 0.25);
            border-radius: 18px;
            padding: 1.75rem;
            backdrop-filter: blur(20px);
            animation: slideIn 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .payment-process-panel.active {
            display: block;
        }

        .process-instructions {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 1.25rem;
            line-height: 1.6;
            font-weight: 400;
        }

        .process-input-container {
            display: flex;
            gap: 0.75rem;
        }

        .process-input {
            flex: 1;
            background: rgba(0, 0, 0, 0.2);
            border: 1.5px solid var(--glass-border);
            border-radius: 12px;
            padding: 0.85rem 1.1rem;
            color: var(--text-main);
            font-size: 0.95rem;
            outline: none;
            transition: all 0.2s ease;
            caret-color: var(--neon-cyan);
        }

        .process-input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .process-input:focus {
            background: rgba(0, 0, 0, 0.3);
            border-color: var(--neon-cyan);
            box-shadow: 0 0 12px rgba(61, 240, 255, 0.2);
        }

        .process-submit-btn {
            background: linear-gradient(135deg, var(--neon-cyan) 0%, #00c4ff 100%);
            color: var(--bg-color);
            border: none;
            padding: 0.85rem 1.8rem;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 0.95rem;
            letter-spacing: 0.02em;
            box-shadow: 0 4px 15px rgba(61, 240, 255, 0.25);
            flex-shrink: 0;
        }

        .process-submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(61, 240, 255, 0.35);
        }

        .process-submit-btn:active {
            transform: translateY(0);
        }

        .error-msg {
            color: #ff6b6b;
            font-size: 0.85rem;
            margin-top: 0.75rem;
            display: none;
            font-weight: 500;
            animation: shake 0.3s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
        }

        @media (max-width: 768px) {
            .dashboard-layout {
                grid-template-columns: 1fr;
            }

            body {
                padding: 1.5rem;
            }

            .workspace {
                gap: 1.5rem;
            }

            h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>

    <div class="workspace">
        <h1>ElectroFix // Command_Center</h1>

        <div class="dashboard-layout">
            <div class="glass-card">
                <div class="card-title">Incoming Diagnostics Stream</div>
                <div class="stream-item">
                    <span id="streamDot" class="stream-indicator"></span>
                    <span id="streamText">Diagnostics #76S — <strong>Awaiting Service Fee</strong></span>
                </div>
            </div>

            <div class="glass-card">
                <div class="card-title">Secure Gateway Payment</div>
                <div class="payment-methods-grid">
                    
                    <div class="payment-node-option" onclick="showProcess('Telebirr', '0912345678')">
                        <div>
                            <h4>Telebirr Mobile Pay</h4>
                            <p>Submit transaction text code</p>
                        </div>
                        <div>→</div>
                    </div>

                    <div class="payment-node-option" onclick="showProcess('CBE', '1000123456789')">
                        <div>
                            <h4>CBE Birr Portal</h4>
                            <p>Submit bank transfer code</p>
                        </div>
                        <div>→</div>
                    </div>

                </div>

                <div id="processArea" class="payment-process-panel">
                    <div id="processInstructions" class="process-instructions"></div>
                    <div class="process-input-container">
                        <input type="text" id="transactionCodeInput" class="process-input" placeholder="Paste code here...">
                        <button class="process-submit-btn" onclick="submitTransactionCode()">Submit</button>
                    </div>
                    <div id="errorField" class="error-msg">Please type a code first.</div>
                </div>

            </div>
        </div>
    </div>

    <script>
        let chosenMethod = '';

        function showProcess(method, accountDetails) {
            chosenMethod = method;
            document.getElementById('errorField').style.display = 'none';
            document.getElementById('processArea').classList.add('active');
            
            if(method === 'Telebirr') {
                document.getElementById('processInstructions').innerHTML = `Transfer to Telebirr: <strong>${accountDetails}</strong>. Then enter your confirmation transaction text code below:`;
            } else {
                document.getElementById('processInstructions').innerHTML = `Transfer to CBE Account: <strong>${accountDetails}</strong>. Then enter your Txn Ref code below:`;
            }
        }

        function submitTransactionCode() {
            const enteredCode = document.getElementById('transactionCodeInput').value.trim();
            
            if (!enteredCode) {
                document.getElementById('errorField').style.display = 'block';
                return;
            }

            document.getElementById('streamDot').style.background = "#c084fc";
            document.getElementById('streamText').innerHTML = `Diagnostics #76S — <span style="color: #c084fc">Verifying ${chosenMethod} Code: <strong>${enteredCode}</strong></span>`;

            document.getElementById('transactionCodeInput').value = '';
            document.getElementById('processArea').classList.remove('active');
        }
    </script>
</body>
</html>
